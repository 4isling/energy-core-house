name: Deploy to GitHub Pages

# Build le coeur Rust en WASM (wasm-pack) puis le front Vite, et publie le
# dossier statique sur GitHub Pages. Accessible ensuite depuis n'importe quel
# navigateur (mobile inclus) a l'URL https://4isling.github.io/energy-core-house/.

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

# Permissions requises par actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul deploiement Pages a la fois ; on annule les builds en cours.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.toml') }}

      # On compile le WASM via cargo + wasm-bindgen (le script npm `wasm`), pas
      # via wasm-pack qui casse avec les Cargo récents (flag --out-dir).
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build WASM core
        working-directory: web
        run: npm run wasm

      - name: Build static site
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
